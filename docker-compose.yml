version: "3.9"

networks:
  rede:
    external: true

services:
  gateway:
    build: .
    container_name: zambom-gateway
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - INGRESSOS_SERVICE_URL=${INGRESSOS_SERVICE_URL}
      - USUARIOS_SERVICE_URL=${USUARIOS_SERVICE_URL}
      - EVENTOS_SERVICE_URL=${EVENTOS_SERVICE_URL}
    ports:
      - "${APP_PORT:-8080}:8080"
    networks:
      - rede
    restart: unless-stopped
