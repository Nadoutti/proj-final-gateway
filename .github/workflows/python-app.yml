name: Deploy Gateway

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: "carloslifranco"
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: carloslifranco/gateway:latest

    - name: Deploy via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOST_TEST }}
        username: "ubuntu"
        key: ${{ secrets.KEY_TEST }}
        port: 22
        script: |
          mkdir -p ~/gateway-folder && cd ~/gateway-folder
          
          export JWT_SECRET="${{ secrets.JWT_SECRET }}"
          export JWT_ALGORITHM="HS256"
          export USUARIOS_SERVICE_URL="http://user:8001"
          export EVENTOS_SERVICE_URL="http://eventos:8002"
          export INGRESSOS_SERVICE_URL="http://tickets-service:8000"
          export APP_PORT=8080
          
          docker-compose pull
          docker-compose up -d --build